on:
  workflow_run:
    workflows: ["Go test coverage"]
    types:
      - completed

name: Post coverage report to PR

jobs:
  comment:
    name: Post coverage report
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Download PR metadata
        id: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR metadata
        if: steps.download.outcome == 'success'
        id: metadata
        run: |
          echo "pr-number=$(cat pr-number)" >> "$GITHUB_OUTPUT"
          {
            echo "coverage-report<<GHEOF"
            cat coverage-report.json
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage report to PR
        if: steps.download.outcome == 'success'
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          comment-tag: coverage-report
          pr-number: ${{ steps.metadata.outputs.pr-number }}
          message: |
            `go-test-coverage` report
            ```
            ${{ fromJSON(steps.metadata.outputs.coverage-report) }}```